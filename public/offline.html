<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — MotoMart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #030712;
      color: #f3f4f6;
      padding: 1rem;
    }
    .card {
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #1e3a5f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p  { color: #9ca3af; font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .logo {
      font-size: 1.25rem;
      font-weight: 900;
      margin-bottom: 2rem;
      color: #fff;
    }
    .logo span { color: #f97316; }
    button {
      background: #f97316;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #ea6c0a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Moto<span>Mart</span></div>
    <div class="icon">🔧</div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Check your network and try again — your cart and session are safely saved.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
